<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <!-- 1. Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Load Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      /* 3. Apply Inter font */
      body {
        font-family: 'Inter', sans-serif;
      }
    </style>
</head>
<body class="bg-orange-50 min-h-screen flex items-center justify-center p-4">

  <!-- Main Payment Card -->
  <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg w-full max-w-2xl my-8">
    <h1 class="text-3xl font-bold text-orange-600 mb-6 text-center">💳 Payment Summary</h1>
    
    <!-- Order Table -->
    <div class="overflow-x-auto rounded-lg border border-gray-200">
      <table class="w-full" id="orderTable">
        <thead>
          <tr class="bg-orange-500 text-white">
            <th class="p-3 text-left text-sm font-semibold uppercase">Item</th>
            <th class="p-3 text-center text-sm font-semibold uppercase">Qty</th>
            <th class="p-3 text-right text-sm font-semibold uppercase">Price</th>
          </tr>
        </thead>
        <tbody>
          <!-- Items will be injected here by JS -->
        </tbody>
      </table>
    </div>

    <!-- Totals Section -->
    <div class="mt-6 space-y-3">
      <div class="flex justify-between items-center text-gray-700">
        <span class="font-medium">Subtotal:</span>
        <span class="font-bold text-lg">₹<span id="totalAmount">0.00</span></span>
      </div>
      
      <div class="flex justify-between items-center text-blue-600" id="discountRow" style="display: none;">
        <span class="font-medium">Discount Applied:</span>
        <span class="font-bold text-lg" id="discountText"></span>
      </div>

      <div class="flex justify-between items-center text-gray-900 border-t pt-3 mt-3">
        <span class="font-bold text-xl">Final Total:</span>
        <span class="font-bold text-2xl text-green-700">₹<span id="finalTotal">0.00</span></span>
      </div>
    </div>

    <!-- Discount Input Section -->
    <div class="mt-8 pt-6 border-t">
      <label for="discountInput" class="block text-sm font-medium text-gray-600 mb-2">🏷️ Have a discount code?</label>
      <div class="flex flex-col sm:flex-row gap-3">
        <input type="number" id="discountInput" placeholder="e.g. 10" class="flex-grow p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-400 focus:outline-none w-full sm:w-auto" min="0" max="100">
        <button onclick="applyDiscount()" class="bg-orange-500 text-white p-3 rounded-lg font-semibold hover:bg-orange-600 transition-colors shadow-sm w-full sm:w-auto">
          Apply
        </button>
      </div>
    </div>

    <!-- Proceed to Pay Button -->
    <button onclick="proceedToPay()" class="bg-green-600 text-white p-4 rounded-lg font-semibold hover:bg-green-700 transition-colors shadow-lg w-full mt-8 text-lg">
      Proceed to Pay
    </button>
  </div>

  <!-- Custom Modal for Alerts -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm text-center">
      <p id="modalMessage" class="text-gray-800 text-lg mb-6"></p>
      <button onclick="closeModal()" class="bg-orange-500 text-white px-6 py-2 rounded-lg font-semibold hover:bg-orange-600 transition-colors">
        OK
      </button>
    </div>
  </div>
<script>
  // ---------------------------
  // Cache DOM nodes
  // ---------------------------
  const tableBody = document.querySelector("#orderTable tbody");
  const totalAmountEl = document.getElementById("totalAmount");
  const finalTotalEl = document.getElementById("finalTotal");
  const discountText = document.getElementById("discountText");
  const discountRow = document.getElementById("discountRow");
  const discountInputEl = document.getElementById("discountInput");

  const modal = document.getElementById("modal");
  const modalMessage = document.getElementById("modalMessage");
  const modalCloseBtn = document.getElementById("modalClose"); // optional close button if present

  // ---------------------------
  // Load cart & totals once
  // ---------------------------
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const total = parseFloat(localStorage.getItem("total") || 0);

  let discountValue = 0; // current discount in currency (₹)

  // ---------------------------
  // Small helper functions
  // ---------------------------
  function showModal(message) {
    if (modalMessage) modalMessage.textContent = message;
    if (modal) modal.classList.remove("hidden");
  }

  function closeModal() {
    if (modal) modal.classList.add("hidden");
  }

  // Close modal when clicking outside or on close button
  window.addEventListener("click", (event) => {
    if (event.target === modal) closeModal();
  });
  if (modalCloseBtn) {
    modalCloseBtn.addEventListener("click", closeModal);
  }

  // ---------------------------
  // Display cart items & totals
  // ---------------------------
  function formatCurrency(n) {
    // keep 2 decimals; you can localize if needed
    return "₹" + Number(n).toFixed(2);
  }

  if (totalAmountEl) totalAmountEl.textContent = Number(total || 0).toFixed(2);
  if (finalTotalEl) finalTotalEl.textContent = Number(total || 0).toFixed(2);

  if (!tableBody) {
    console.warn("#orderTable tbody not found in DOM.");
  } else {
    tableBody.innerHTML = ""; // clear existing rows
    if (!cart || cart.length === 0) {
      const row = document.createElement("tr");
      row.innerHTML = `<td colspan="3" class="p-4 text-center text-gray-500">Your cart is empty.</td>`;
      tableBody.appendChild(row);
    } else {
      cart.forEach(item => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td class="p-3 border-b border-gray-200 text-gray-800 text-left">${item.name}</td>
          <td class="p-3 border-b border-gray-200 text-gray-800 text-center">${item.qty}</td>
          <td class="p-3 border-b border-gray-200 text-gray-800 text-right font-medium">${formatCurrency(item.price * item.qty)}</td>`;
        tableBody.appendChild(row);
      });
    }
  }

  // Hide discount row initially if present
  if (discountRow) {
    discountRow.style.display = (discountValue > 0 ? "" : "none");
  }

  // ---------------------------
  // Apply discount
  // ---------------------------
  function applyDiscount() {
    if (!discountInputEl) {
      showModal("Discount input not found.");
      return;
    }

    const raw = discountInputEl.value;
    const discountPercent = parseFloat(raw === "" ? "0" : raw);

    if (Number.isNaN(discountPercent) || discountPercent < 0 || discountPercent > 100) {
      showModal("Please enter a valid discount percentage (0–100).");
      return;
    }

    discountValue = (total * discountPercent) / 100;
    const discountedTotal = total - discountValue;

    if (discountText) discountText.textContent = `- ${formatCurrency(discountValue)} (${discountPercent}%)`;
    if (discountRow) discountRow.style.display = ""; // show
    if (finalTotalEl) finalTotalEl.textContent = Number(discountedTotal).toFixed(2);

    showModal("Discount applied successfully!");
  }

  // If you have a DOM button to apply discount, attach listener:
  const applyDiscountBtn = document.getElementById("applyDiscountBtn");
  if (applyDiscountBtn) applyDiscountBtn.addEventListener("click", applyDiscount);

  // ---------------------------
  // Proceed to payment (async)
  // ---------------------------
  async function proceedToPay() {
    // Re-read cart & totals in case they changed
    const currentCart = JSON.parse(localStorage.getItem("cart")) || [];
    if (!currentCart || currentCart.length === 0) {
      showModal("Cart is empty.");
      return;
    }

    const subtotal = parseFloat(localStorage.getItem("total") || 0);
    const discountPercent = parseFloat(discountInputEl ? (discountInputEl.value || "0") : "0") || 0;
    const discountAmount = Number(((subtotal * discountPercent) / 100).toFixed(2)) || 0;
    const finalTotal = parseFloat(finalTotalEl ? finalTotalEl.textContent : subtotal) || subtotal;

    const payload = {
      cart: currentCart,
      subtotal: subtotal,
      discount_percent: discountPercent,
      discount_amount: discountAmount,
      final_total: finalTotal,
      currency: "INR",
      payment_provider: null,
      provider_payment_id: null,
      payment_status: "pending",
      customer_name: null,
      customer_email: null,
      meta: { source: "web_payment" }
    };

    try {
      const resp = await fetch("/create_order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await resp.json().catch(() => null);

      if (!resp.ok) {
        const msg = data && data.message ? data.message : "Failed to place order";
        showModal(msg);
        return;
      }

      // Success
      const orderId = data && data.order_id ? data.order_id : "(unknown)";
      showModal(`Order placed successfully! Order #${orderId}`);

      // Clear client cart
      localStorage.removeItem("cart");
      localStorage.removeItem("total");

      // Optionally redirect:
      // window.location.href = `/order_confirm?order_id=${orderId}`;

    } catch (err) {
      console.error(err);
      showModal("Server error while placing order. Try again.");
    }
  }

  // Expose proceedToPay to global scope if buttons call it inline
  window.proceedToPay = proceedToPay;

  // If you have a pay button with ID "payBtn", attach listener:
  const payBtn = document.getElementById("payBtn");
  if (payBtn) payBtn.addEventListener("click", proceedToPay);

</script>

</body>
</html>
